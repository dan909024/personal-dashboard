name: Notify Harley on push to main

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so we can diff against github.event.before to
          # detect whether this push touched src/lib/harley-auth.ts.
          fetch-depth: 0

      - name: Detect auth-config change
        id: auth_check
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          # github.event.before is "0000…" on the first push of a branch.
          # In that case skip the diff and assume no change.
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "subject_prefix=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" \
              | grep -qx 'src/lib/harley-auth.ts'; then
            echo "subject_prefix=AUTH CONFIG CHANGED — " >> "$GITHUB_OUTPUT"
          else
            echo "subject_prefix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          HARLEY_EMAIL: ${{ secrets.HARLEY_EMAIL }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          SUBJECT_PREFIX: ${{ steps.auth_check.outputs.subject_prefix }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$HARLEY_EMAIL" ]; then
            echo "RESEND_API_KEY or HARLEY_EMAIL repo secret not set — skipping."
            exit 0
          fi
          short_sha="${COMMIT_SHA:0:8}"
          subject="${SUBJECT_PREFIX}Dan deployed to personal-dashboard"
          # Build the JSON via jq so commit messages with quotes / newlines
          # / backslashes don't break the request.
          payload=$(jq -n \
            --arg to "$HARLEY_EMAIL" \
            --arg author "$COMMIT_AUTHOR" \
            --arg msg "$COMMIT_MSG" \
            --arg url "$COMMIT_URL" \
            --arg sha "$short_sha" \
            --arg subject "$subject" \
            '{
              from: "Personal Dashboard <onboarding@resend.dev>",
              to: [$to],
              subject: $subject,
              html: ("<p><strong>Author:</strong> " + ($author | @html) + "</p>"
                  + "<p><strong>Message:</strong> " + ($msg | @html) + "</p>"
                  + "<p><strong>Commit:</strong> <a href=\"" + ($url | @html) + "\">" + $sha + "</a></p>")
            }')
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload"
