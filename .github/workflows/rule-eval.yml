# Daily rule-eval cron. Walks Harley Meter rules and appends
# Punishments rows for any failed days/weeks that haven't been fined yet.
#
# Fires at 12:00 UTC = 22:00 AEST winter / 23:00 AEDT summer. The endpoint
# is idempotent on (ruleId, periodStart) so DST drift doesn't matter — at
# worst the eval lands an hour later. Cron lives on GitHub's runners, so
# Daniel's laptop being asleep doesn't matter.
#
# Daily rules look back 7 days each run, so missing a day doesn't lose
# fines. Weekly rules only fire on Sundays — they score the just-ending
# Mon-Sun and run before the next week starts so Daniel sees the verdict
# Sunday night rather than waking up Monday to surprise fines.

name: Rule eval (daily)

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip writes; return planned fines only'
        type: boolean
        default: false
      today:
        description: "Override today (YYYY-MM-DD, Sydney). Useful to verify the Sunday weekly path or backfill a missed day."
        type: string
        default: ''

jobs:
  fire:
    runs-on: ubuntu-latest
    steps:
      - name: Hit rule-eval endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DASHBOARD_BASE_URL: ${{ secrets.DASHBOARD_BASE_URL }}
          DRY_RUN: ${{ inputs.dry_run }}
          TODAY: ${{ inputs.today }}
        run: |
          url="$DASHBOARD_BASE_URL/api/cron/rule-eval"
          params=""
          if [ "$DRY_RUN" = "true" ]; then
            params="dry_run=1"
          fi
          if [ -n "$TODAY" ]; then
            [ -n "$params" ] && params="$params&"
            params="${params}today=$TODAY"
          fi
          [ -n "$params" ] && url="$url?$params"

          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$url")

          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Status: $status"
          echo "Body: $body"

          if [ "$status" -ne 200 ]; then
            exit 1
          fi
